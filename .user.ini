; Laravel用のPHP設定
; open_basedir制限を緩和（本番サーバーのパスに合わせる）
open_basedir = /home/bungoyoshiba/:/tmp:/var/tmp:/opt/alt/php82/usr/share/pear/:/dev/urandom:/usr/local/lib/php/:/usr/local/php82/lib/php/

; メモリ制限
memory_limit = 256M

; アップロードサイズ
upload_max_filesize = 20M
post_max_size = 25M

; 実行時間
max_execution_time = 300
max_input_time = 300
