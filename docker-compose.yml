services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cafeteria_laravel_web
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - vendor_data:/var/www/html/vendor
    depends_on:
      - db
    environment:
      APP_ENV: local
      APP_DEBUG: 'true'
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: school_cafeteria
      DB_USERNAME: cafeteria_user
      DB_PASSWORD: cafeteria_pass
      MAIL_MAILER: log
      MAIL_FROM_ADDRESS: noreply@example.com
      MAIL_FROM_NAME: "${APP_NAME}"
    networks:
      - cafeteria_network

  db:
    image: mysql:8.0
    container_name: cafeteria_laravel_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: school_cafeteria
      MYSQL_USER: cafeteria_user
      MYSQL_PASSWORD: cafeteria_pass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cafeteria_network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: cafeteria_laravel_phpmyadmin
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: rootpassword
    ports:
      - "8081:80"
    depends_on:
      - db
    networks:
      - cafeteria_network

volumes:
  db_data:
  vendor_data:

networks:
  cafeteria_network:
